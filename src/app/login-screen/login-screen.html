<body>


<h1>SubMISSION</h1>


<div class="page">
  <div class="textFieldContainer">
    <h3>Sign up or Login</h3>

    <label for="username">Username:</label>
    <input type="text" id="username" name="username" [(ngModel)]="username">

    <label for="password">Password:</label>
    
    <input type="password" id="password" name="password" [(ngModel)]="password">

    <button class="button" (click)="createTestUser()">Create An Account</button>
    <a  href="/dashboard/" class="button">Sign In</a> 
  </div>
</div>
</body>
